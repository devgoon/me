name: Make Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  make-check:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run `make check`
        env:
          CI: true
        run: |
          set -e
          make check
