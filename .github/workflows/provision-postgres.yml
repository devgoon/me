name: Provision Azure PostgreSQL

on:
  workflow_dispatch:
    inputs:
      database_name:
        description: "PostgreSQL database name"
        required: false
        default: "portfolio"
      postgres_version:
        description: "PostgreSQL version"
        required: false
        default: "16"
      sku_name:
        description: "Flexible Server SKU"
        required: false
        default: "Standard_B1ms"
      storage_gb:
        description: "Storage size in GB"
        required: false
        default: "32"
      apply_schema:
        description: "Apply db/schema.sql after provisioning"
        required: false
        default: "true"
      apply_import_data:
        description: "Apply db/import.sql after provisioning"
        required: false
        default: "false"

permissions:
  id-token: write
  contents: read

jobs:
  # -----------------------------------------------------------
  # Job 1: Provision – Azure CLI in a job-level container
  # -----------------------------------------------------------
  provision:
    name: Provision PostgreSQL Flexible Server
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/azure-cli:2.83.0
    env:
      RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      LOCATION: ${{ vars.AZURE_LOCATION }}
      SERVER_NAME: ${{ vars.AZURE_PG_SERVER_NAME }}
      ADMIN_USER: ${{ vars.AZURE_PG_ADMIN_USER }}      # Flexible Server: plain username (no @server)
      ADMIN_PASSWORD: ${{ secrets.AZURE_PG_ADMIN_PASSWORD }}
      DATABASE_NAME: ${{ inputs.database_name }}
      POSTGRES_VERSION: ${{ inputs.postgres_version }}
      SKU_NAME: ${{ inputs.sku_name }}
      STORAGE_GB: ${{ inputs.storage_gb }}

    outputs:
      fqdn: ${{ steps.getfqdn.outputs.fqdn }}
      db: ${{ env.DATABASE_NAME }}
      admin_user: ${{ env.ADMIN_USER }}
      server_name: ${{ env.SERVER_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required vars and secrets
        shell: bash
        run: |
          set -euo pipefail
          required=(RESOURCE_GROUP LOCATION SERVER_NAME ADMIN_USER ADMIN_PASSWORD DATABASE_NAME POSTGRES_VERSION SKU_NAME STORAGE_GB)
          for item in "${required[@]}"; do
            if [[ -z "${!item:-}" ]]; then
              echo "Missing required value: $item"
              exit 1
            fi
          done

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure resource group exists
        shell: bash
        run: |
          az group create \
            --name "$RESOURCE_GROUP" \
            --location "$LOCATION" \
            --output table

      - name: Create or update PostgreSQL Flexible Server
        shell: bash
        run: |
          set -euo pipefail
          if az postgres flexible-server show \
              --name "$SERVER_NAME" \
              --resource-group "$RESOURCE_GROUP" >/dev/null 2>&1; then
            echo "Server already exists: $SERVER_NAME"
          else
            az postgres flexible-server create \
              --name "$SERVER_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --location "$LOCATION" \
              --admin-user "$ADMIN_USER" \
              --admin-password "$ADMIN_PASSWORD" \
              --version "$POSTGRES_VERSION" \
              --sku-name "$SKU_NAME" \
              --storage-size "$STORAGE_GB" \
              --public-access none \
              --output table
          fi

      - name: Create database if missing
        shell: bash
        run: |
          set -euo pipefail
          if az postgres flexible-server db show \
              --resource-group "$RESOURCE_GROUP" \
              --server-name "$SERVER_NAME" \
              --database-name "$DATABASE_NAME" >/dev/null 2>&1; then
            echo "Database already exists: $DATABASE_NAME"
          else
            az postgres flexible-server db create \
              --resource-group "$RESOURCE_GROUP" \
              --server-name "$SERVER_NAME" \
              --database-name "$DATABASE_NAME" \
              --output table
          fi

      - name: Get FQDN
        id: getfqdn
        shell: bash
        run: |
          set -euo pipefail
          FQDN=$(az postgres flexible-server show \
            --resource-group "$RESOURCE_GROUP" \
            --name "$SERVER_NAME" \
            --query fullyQualifiedDomainName -o tsv)
          echo "fqdn=$FQDN" >> "$GITHUB_OUTPUT"
          echo "Server FQDN: $FQDN"

      - name: Print connection info
        shell: bash
        run: |
          echo "PostgreSQL server ready: $SERVER_NAME"
          echo "Database ready: $DATABASE_NAME"
          echo "FQDN: ${{ steps.getfqdn.outputs.fqdn }}"
          echo ""
          echo "Connection string (Flexible Server username is plain, TLS required):"
          echo "postgresql://$ADMIN_USER:<password>@${{ steps.getfqdn.outputs.fqdn }}:5432/$DATABASE_NAME?sslmode=require"

  # -----------------------------------------------------------
  # Job 2: Apply SQL – Postgres client in a job-level container
  # -----------------------------------------------------------
  apply-sql:
    name: Apply schema/import with psql
    needs: provision
    runs-on: ubuntu-latest
    container: postgres:16
    env:
      ADMIN_USER: ${{ needs.provision.outputs.admin_user }}
      ADMIN_PASSWORD: ${{ secrets.AZURE_PG_ADMIN_PASSWORD }}
      FQDN: ${{ needs.provision.outputs.fqdn }}
      DATABASE_NAME: ${{ needs.provision.outputs.db }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply schema.sql
        if: ${{ inputs.apply_schema == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          test -f db/schema.sql || { echo "db/schema.sql not found"; exit 1; }
          psql "postgresql://${ADMIN_USER}:${ADMIN_PASSWORD}@${FQDN}:5432/${DATABASE_NAME}?sslmode=require" \
               -v ON_ERROR_STOP=1 -f db/schema.sql

      - name: Import db (import.sql)
        if: ${{ inputs.apply_import_data == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          test -f db/import.sql || { echo "db/import.sql not found"; exit 1; }
          psql "postgresql://${ADMIN_USER}:${ADMIN_PASSWORD}@${FQDN}:5432/${DATABASE_NAME}?sslmode=require" \
               -v ON_ERROR_STOP=1 -f db/import.sql