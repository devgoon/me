name: Warm-up Ping

on:
  schedule:
    # every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint (warms DB + AI clients)
        run: |
          set -euo pipefail
          url="https://lodovi.co/api/health"
          echo "Pinging $url"
          # Try a few times before failing to smooth transient network errors
          for i in 1 2 3; do
            if curl -fsS -m 30 "$url" -o /dev/null; then
              echo "Ping succeeded"
              exit 0
            fi
            sleep 2
          done
          echo "Ping failed after retries"
          curl -v "$url" || true
          exit 1
