name: BUILD AND DEPLOY

on:
  push:
    branches: [ai-portfolio]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: swa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI CHECKS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0

      - name: Install dependencies
        run: make install

      - name: CHECKS
        run: make check

      - name: ENSURE FRONTEND ASSETS PRESENT
        run: echo "No UI build required; assets/js is source of truth"

      - name: RUN NPM AUDIT
        run: npm audit --json > audit.json || true

      - name: FAIL ON CRITICAL VULNERABILITIES
        run: |
          node -e "
          const fs = require('fs');
          const path = './audit.json';
          if (!fs.existsSync(path)) { console.log('No audit report'); process.exit(0); }
          const data = JSON.parse(fs.readFileSync(path, 'utf8'));
          const vulns = data && data.vulnerabilities ? Object.values(data.vulnerabilities) : [];
          const critical = vulns.filter(v => v.severity === 'critical').length;
          if (critical > 0) { console.error('Critical vulnerabilities found:', critical); process.exit(1); }
          console.log('No critical vulnerabilities');
          "

  deploy:
    name: DEPLOY
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: CHECKOUT
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: USE NODE.JS 22.18.0
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0

      - name: VALIDATE AI DEPLOYMENT SETTINGS
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AZURE_DATABASE_URL: ${{ secrets.AZURE_DATABASE_URL }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          set -euo pipefail
          if [[ -z "${ANTHROPIC_API_KEY:-}" ]]; then
            echo "Missing required secret: ANTHROPIC_API_KEY"
            exit 1
          fi
          if [[ -z "${AZURE_DATABASE_URL:-}" ]]; then
            echo "Missing required secret: AZURE_DATABASE_URL"
            exit 1
          fi
          if [[ -z "${AI_MODEL:-}" ]]; then
            echo "Missing required variable: AI_MODEL"
            exit 1
          fi
          if [[ -z "${RESOURCE_GROUP:-}" ]]; then
            echo "Missing required variable: AZURE_RESOURCE_GROUP"
            exit 1
          fi

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: PERSIST RUNTIME APP SETTINGS TO STATIC WEB APP
        shell: bash
        env:
          STATIC_WEB_APP_NAME: ${{ vars.AZURE_STATIC_WEB_APP_NAME }}
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AZURE_DATABASE_URL: ${{ secrets.AZURE_DATABASE_URL }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          WEBSITE_NODE_DEFAULT_VERSION: "22.18.0"
        run: |
          set -euo pipefail
          echo "Setting Static Web App runtime settings for $STATIC_WEB_APP_NAME ($RESOURCE_GROUP)"
          az staticwebapp appsettings set \
            --name "$STATIC_WEB_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --setting-names \
              AI_MODEL="$AI_MODEL" \
              ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
              AZURE_DATABASE_URL="$AZURE_DATABASE_URL"
              WEBSITE_NODE_DEFAULT_VERSION="$WEBSITE_NODE_DEFAULT_VERSION"

      - name: DEPLOY
        uses: Azure/static-web-apps-deploy@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AZURE_DATABASE_URL: ${{ secrets.AZURE_DATABASE_URL }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          WEBSITE_NODE_DEFAULT_VERSION: "22.18.0"
          SWA_DEPLOY_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          STATIC_WEB_APP_NAME: ${{ vars.AZURE_STATIC_WEB_APP_NAME }}
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_DEPLOY_TOKEN }}
          skip_app_build: true # ✅ prevents Oryx from rebuilding the static app
          action: upload
          app_location: 'frontend' # serve site from `frontend/` (assets/ present)
          api_location: 'api/' # ✅ deploy functions directly from api/: site is static from repo root (html + assets)
          # leaving this blank avoids Oryx scanning the repo root for builds

      - name: SMOKE TEST AAD LOGIN ENDPOINT
        shell: bash
        run: |
          set -euo pipefail

          HOST="${SITE_HOSTNAME:-lodovi.co}"
          # Sanity-check host to avoid malformed-URL errors (skip if invalid)
          if [[ ! "$HOST" =~ ^[A-Za-z0-9.-]+$ ]]; then
            echo "Skipping AAD smoke test: SITE_HOSTNAME contains unexpected characters: $HOST"
            exit 0
          fi
          URL="https://${HOST}/.auth/login/aad?post_login_redirect_uri=/admin"
          echo "Testing auth endpoint: $URL"

          HEADERS=$(curl -sS -I -m 60 "$URL")
          STATUS=$(printf "%s\n" "$HEADERS" | awk 'NR==1 { print $2 }')
          LOCATION=$(printf "%s\n" "$HEADERS" | awk 'tolower($1)=="location:" { print $2 }' | tr -d '\r' | head -n 1)

          if [[ "$STATUS" != "302" ]]; then
            echo "Expected HTTP 302 from AAD login endpoint, got: $STATUS"
            echo "$HEADERS"
            exit 1
          fi

          if [[ "$LOCATION" != https://identity.*.azurestaticapps.net/* ]]; then
            echo "Unexpected AAD login redirect location: $LOCATION"
            echo "$HEADERS"
            exit 1
          fi

          echo "AAD login endpoint looks healthy for $HOST"

      - name: SMOKE TEST API HEALTH ENDPOINT
        shell: bash
        run: |
          set -euo pipefail
          HOST="${SITE_HOSTNAME:-lodovi.co}"
          # Sanity-check host to avoid malformed-URL errors (skip if invalid)
          if [[ ! "$HOST" =~ ^[A-Za-z0-9.-]+$ ]]; then
            echo "Skipping API health smoke test: SITE_HOSTNAME contains unexpected characters: $HOST"
            exit 0
          fi
          URL="https://${HOST}/api/health"
          echo "Testing API health endpoint: $URL"

          HTTP_CODE=$(curl -sS -m 60 -o /tmp/health.json -w "%{http_code}" "$URL")
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "Expected HTTP 200 from /api/health, got: $HTTP_CODE"
            cat /tmp/health.json || true
            exit 1
          fi

          if ! grep -q '"ok"' /tmp/health.json; then
            echo "Health response does not include expected 'ok' field"
            cat /tmp/health.json || true
            exit 1
          fi

          echo "API health endpoint looks healthy for $HOST"

  e2e:
    name: END-TO-END TESTS
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: CHECKOUT
        uses: actions/checkout@v4

      - name: SETUP NODE.JS
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: AZURE LOGIN
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: RESOLVE STATIC WEB APP HOSTNAME
        shell: bash
        env:
          STATIC_WEB_APP_NAME: ${{ vars.AZURE_STATIC_WEB_APP_NAME }}
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          set -euo pipefail
          if [ -z "${STATIC_WEB_APP_NAME:-}" ] || [ -z "${RESOURCE_GROUP:-}" ]; then
            echo "Missing Static Web App variables; set AZURE_STATIC_WEB_APP_NAME and AZURE_RESOURCE_GROUP";
            exit 1;
          fi
          HOST=$(az staticwebapp show --name "$STATIC_WEB_APP_NAME" --resource-group "$RESOURCE_GROUP" --query defaultHostname -o tsv)
          if [ -z "$HOST" ]; then
            echo "Failed to resolve Static Web App hostname"; exit 1;
          fi
          echo "Static Web App hostname: $HOST"
          echo "HOST=$HOST" >> $GITHUB_ENV
          echo "BASE_URL=https://$HOST" >> $GITHUB_ENV

      - name: INSTALL DEPENDENCIES
        run: npm ci

      - name: INSTALL PLAYWRIGHT BROWSERS
        run: npx playwright install --with-deps

      - name: RUN E2E (AGAINST DEPLOYED URL)
        env:
          CI: true
          BASE_URL: ${{ env.BASE_URL }}
          E2E_PREVIEW_ENFORCES_AUTH: '1'
        run: |
          set -e
          echo "Using BASE_URL=${BASE_URL}"
          make e2e
