name: BUILD AND DEPLOY

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: swa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: 'npm'

      - name: Install dependencies
        run: make install-ci

      - name: Checks
        run: make check

      - name: Prompt and response evals
        run: make evals

      - name: Ensure frontend assets present
        run: |
          echo "Building React frontend under frontend-react/dist..."
          npm ci --prefix frontend-react
          npm --prefix frontend-react run build

      - name: Run npm audit
        run: npm audit --json > audit.json || true

      - name: Fail on critical vulnerabilities
        run: |
          node -e "
          const fs = require('fs');
          const path = './audit.json';
          if (!fs.existsSync(path)) { console.log('No audit report'); process.exit(0); }
          const data = JSON.parse(fs.readFileSync(path, 'utf8'));
          const vulns = data && data.vulnerabilities ? Object.values(data.vulnerabilities) : [];
          const critical = vulns.filter(v => v.severity === 'critical').length;
          if (critical > 0) { console.error('Critical vulnerabilities found:', critical); process.exit(1); }
          console.log('No critical vulnerabilities');
          "

  deploy:
    name: Deploy
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      deployed_url: ${{ steps.capture-url.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Use Node.js 22.18.0
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0

      - name: Install dependencies (deploy)
        run: make install-ci

      - name: Deploy
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        if: github.event_name == 'pull_request'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AZURE_DATABASE_URL: ${{ secrets.AZURE_DATABASE_URL }}
          AI_MODEL: ${{ vars.AI_MODEL }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          skip_app_build: false
          action: upload
          app_location: 'frontend-react'
          api_location: 'api/'
          app_artifact_location: 'dist'
          deployment_environment: 'staging'

      - name: Deploy (main)
        id: deploy-main
        uses: Azure/static-web-apps-deploy@v1
        if: github.event_name == 'push'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AZURE_DATABASE_URL: ${{ secrets.AZURE_DATABASE_URL }}
          AI_MODEL: ${{ vars.AI_MODEL }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          skip_app_build: false
          action: upload
          app_location: 'frontend-react'
          api_location: 'api/'
          app_artifact_location: 'dist'

      - name: Capture deployed URL
        id: capture-url
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "url=${{ steps.deploy.outputs.static_web_app_url }}" >> $GITHUB_OUTPUT
          else
            echo "url=${{ steps.deploy-main.outputs.static_web_app_url }}" >> $GITHUB_OUTPUT
          fi

      - name: Smoke test AAD login endpoint
        shell: bash
        env:
          BASE_URL: ${{ steps.capture-url.outputs.url }}
        run: |
          set -euo pipefail

          if [[ -z "$BASE_URL" ]]; then
            echo "Deploy step did not return static_web_app_url"
            exit 1
          fi
          BASE_URL="${BASE_URL%/}"
          URL="${BASE_URL}/.auth/login/aad?post_login_redirect_uri=/admin"
          echo "Testing auth endpoint: $URL"

          HEADERS=$(curl -sS -I -m 60 "$URL")
          STATUS=$(printf "%s\n" "$HEADERS" | awk 'NR==1 { print $2 }')
          LOCATION=$(printf "%s\n" "$HEADERS" | awk 'tolower($1)=="location:" { print $2 }' | tr -d '\r' | head -n 1)

          if [[ "$STATUS" != "302" ]]; then
            echo "Expected HTTP 302 from AAD login endpoint, got: $STATUS"
            echo "$HEADERS"
            exit 1
          fi

          if [[ "$LOCATION" != https://identity.*.azurestaticapps.net/* ]]; then
            echo "Unexpected AAD login redirect location: $LOCATION"
            echo "$HEADERS"
            exit 1
          fi

          echo "AAD login endpoint looks healthy for $BASE_URL"

      - name: Smoke test API health endpoint
        shell: bash
        env:
          BASE_URL: ${{ steps.capture-url.outputs.url }}
        run: |
          set -euo pipefail

          if [[ -z "$BASE_URL" ]]; then
            echo "Deploy step did not return static_web_app_url"
            exit 1
          fi
          BASE_URL="${BASE_URL%/}"
          URL="${BASE_URL}/api/health"
          echo "Testing API health endpoint: $URL"

          HTTP_CODE=$(curl -sS -m 60 -o /tmp/health.json -w "%{http_code}" "$URL")
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "Expected HTTP 200 from /api/health, got: $HTTP_CODE"
            cat /tmp/health.json || true
            exit 1
          fi

          if ! grep -q '"ok"' /tmp/health.json; then
            echo "Health response does not include expected 'ok' field"
            cat /tmp/health.json || true
            exit 1
          fi

          echo "API health endpoint looks healthy for $BASE_URL"

  e2e:
    name: End-to-end tests
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Validate deployed URL from deploy job
        shell: bash
        env:
          BASE_URL: ${{ needs.deploy.outputs.deployed_url }}
        run: |
          set -euo pipefail
          if [[ -z "${BASE_URL:-}" ]]; then
            echo "Missing deploy output URL from deploy job"
            exit 1
          fi
          echo "Using deployed URL: ${BASE_URL}"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run e2e (against deployed URL)
        env:
          CI: true
          BASE_URL: ${{ needs.deploy.outputs.deployed_url }}
          E2E_PREVIEW_ENFORCES_AUTH: '1'
        run: |
          set -e
          echo "Using BASE_URL=${BASE_URL}"
          make e2e
