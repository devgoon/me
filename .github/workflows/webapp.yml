name: Build and Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: swa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    uses: ./.github/workflows/quality.yml

  security-audit:
    name: Security Audit
    uses: ./.github/workflows/security-audit.yml

  deploy:
    name: Deploy
    needs: [quality, security-audit]
    runs-on: ubuntu-latest
    steps:
    
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_BAY_0D4AD7C0F }}
          action: upload
          app_location: "/"
          skip_app_build: true