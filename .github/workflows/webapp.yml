name: Build and Deploy

on:
  push:
    branches: [ ai-portfolio ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: swa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Quality and Security Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.1

      - name: Install dependencies
        run: make install

      - name: Checks
        run: make check

      - name: Ensure frontend assets present
        run: echo "No UI build required; assets/js is source of truth"

      - name: API unit tests
        run: make unit-test

      - name: Link check
        run: make link-check

      - name: Run npm audit
        run: npm audit --json > audit.json || true

      - name: Fail on critical vulnerabilities
        run: |
          node -e "
          const fs = require('fs');
          const path = './audit.json';
          if (!fs.existsSync(path)) { console.log('No audit report'); process.exit(0); }
          const data = JSON.parse(fs.readFileSync(path, 'utf8'));
          const vulns = data && data.vulnerabilities ? Object.values(data.vulnerabilities) : [];
          const critical = vulns.filter(v => v.severity === 'critical').length;
          if (critical > 0) { console.error('Critical vulnerabilities found:', critical); process.exit(1); }
          console.log('No critical vulnerabilities');
          "

  deploy:
    name: Deploy
    needs: ci
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      AZURE_DATABASE_URL: ${{ secrets.AZURE_DATABASE_URL }}
      SWA_DEPLOY_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
      AI_MODEL: ${{ vars.AI_MODEL }}
      RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      STATIC_WEB_APP_NAME: ${{ vars.AZURE_STATIC_WEB_APP_NAME }}
    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.1

      - name: Validate AI deployment settings
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${ANTHROPIC_API_KEY:-}" ]]; then
            echo "Missing required secret: ANTHROPIC_API_KEY"
            exit 1
          fi
          if [[ -z "${AZURE_DATABASE_URL:-}" ]]; then
            echo "Missing required secret: AZURE_DATABASE_URL"
            exit 1
          fi
          if [[ -z "${AI_MODEL:-}" ]]; then
            echo "Missing required variable: AI_MODEL"
            exit 1
          fi
          if [[ -z "${RESOURCE_GROUP:-}" ]]; then
            echo "Missing required variable: RESOURCE_GROUP"
            exit 1
          fi

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Sync API app settings to Azure Static Web App
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail

            if [[ -z "${STATIC_WEB_APP_NAME:-}" ]]; then
              APP_COUNT=$(az staticwebapp list --resource-group "${RESOURCE_GROUP:-}" --query "length(@)" -o tsv)
              if [[ "$APP_COUNT" != "1" ]]; then
                echo "Expected exactly 1 Static Web App in resource group '$RESOURCE_GROUP', found: $APP_COUNT"
                echo "Set vars.AZURE_STATIC_WEB_APP_NAME to the target app name to avoid discovery."
                exit 1
              fi
              STATIC_WEB_APP_NAME=$(az staticwebapp list --resource-group "${RESOURCE_GROUP:-}" --query "[0].name" -o tsv)
            fi

            if [[ -z "${STATIC_WEB_APP_NAME:-}" ]]; then
              echo "Unable to resolve Static Web App name"
              exit 1
            fi

            echo "Updating app settings on Static Web App: $STATIC_WEB_APP_NAME"

            az staticwebapp appsettings set \
              --name "${STATIC_WEB_APP_NAME:-}" \
              --resource-group "${RESOURCE_GROUP:-}" \
              --setting-names \
                ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
                AZURE_DATABASE_URL="$AZURE_DATABASE_URL" \
                AI_MODEL="$AI_MODEL" \
                RESOURCE_GROUP="${RESOURCE_GROUP:-}" \
              --output table

      - name: Prepare clean deploy package
        shell: bash
        run: |
          set -euo pipefail
          echo "Preparing swa-dist (excluding db, local caches, and node_modules)"
          rm -rf swa-dist
          mkdir -p swa-dist
          shopt -s dotglob || true
          for p in *; do
            # Skip meta and known large directories/files
            case "$p" in
              .git|swa-dist|db|.azurite|coverage|.nyc_output|node_modules|.env|.env.local|dist|build|.vscode)
                echo "Skipping $p"
                continue
                ;;
            esac
            cp -a "$p" swa-dist/ || true
          done

          # Remove problematic file types
          find swa-dist -type f \( \
            -name "*.bacpac" -o -name "*.zip" -o -name "*.tar" -o -name "*.tgz" -o -name "*.bak" \
            -o -name ".env*" -o -name "*.log" -o -name "*.lock" \) \
            -exec rm -f {} + || true

          # Ensure config files are present
          if [ -f staticwebapp.config.json ]; then
            cp staticwebapp.config.json swa-dist/
          fi

          # Remove copied api/node_modules
          if [ -d swa-dist/api/node_modules ]; then
            echo "Removing copied api/node_modules from swa-dist"
            rm -rf swa-dist/api/node_modules || true
          fi

          # Install production API dependencies
          if [ -d swa-dist/api ]; then
            echo "Installing production API dependencies"
            pushd swa-dist/api >/dev/null
            npm ci --omit=dev
            popd >/dev/null
          fi

          echo "swa-dist prepared successfully"
          du -sh swa-dist

      - name: Show swa-dist size (MB)
        shell: bash
        run: |
          set -euo pipefail
          if [ -d swa-dist ]; then
            SIZE_MB=$(du -sm swa-dist | awk '{print $1}')
            echo "swa-dist size: ${SIZE_MB} MB"
          else
            echo "swa-dist not found"
            exit 1
          fi

      - name: List swa-dist contents for debugging
        shell: bash
        run: |
          set -euo pipefail
          echo "Listing swa-dist root:"; ls -la swa-dist || true
          echo "Listing swa-dist/api:"; ls -la swa-dist/api || true
          echo "Sizes:"; du -sh swa-dist swa-dist/api swa-dist/api/node_modules || true

      - name: Validate deployment package
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking critical files..."
          [ -f swa-dist/staticwebapp.config.json ] || { echo "Missing staticwebapp.config.json"; exit 1; }
          [ -d swa-dist/api ] || { echo "Missing api directory"; exit 1; }
          [ -f swa-dist/api/package.json ] || { echo "Missing api/package.json"; exit 1; }
          [ -d swa-dist/api/node_modules ] || { echo "Missing api/node_modules"; exit 1; }
          echo "All critical files present"
          find swa-dist/api/node_modules -maxdepth 0 -type d -exec du -sh {} \;

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "swa-dist"
          api_location: "swa-dist/api"
          skip_app_build: true

      - name: Smoke test AAD login endpoint
        if: ${{ env.SWA_DEPLOY_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail

          HOST="${SITE_HOSTNAME:-lodovi.co}"
          URL="https://${HOST}/.auth/login/aad?post_login_redirect_uri=/admin"
          echo "Testing auth endpoint: $URL"

          HEADERS=$(curl -sS -I -m 20 "$URL")
          STATUS=$(printf "%s\n" "$HEADERS" | awk 'NR==1 { print $2 }')
          LOCATION=$(printf "%s\n" "$HEADERS" | awk 'tolower($1)=="location:" { print $2 }' | tr -d '\r' | head -n 1)

          if [[ "$STATUS" != "302" ]]; then
            echo "Expected HTTP 302 from AAD login endpoint, got: $STATUS"
            echo "$HEADERS"
            exit 1
          fi

          if [[ "$LOCATION" != https://identity.*.azurestaticapps.net/* ]]; then
            echo "Unexpected AAD login redirect location: $LOCATION"
            echo "$HEADERS"
            exit 1
          fi

          echo "AAD login endpoint looks healthy for $HOST"

      - name: Smoke test API health endpoint
        if: ${{ env.SWA_DEPLOY_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail

          HOST="${SITE_HOSTNAME:-lodovi.co}"
          URL="https://${HOST}/api/health"
          echo "Testing API health endpoint: $URL"

          HTTP_CODE=$(curl -sS -m 20 -o /tmp/health.json -w "%{http_code}" "$URL")
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "Expected HTTP 200 from /api/health, got: $HTTP_CODE"
            cat /tmp/health.json || true
            exit 1
          fi

          if ! grep -q '"ok"' /tmp/health.json; then
            echo "Health response does not include expected 'ok' field"
            cat /tmp/health.json || true
            exit 1
          fi

          echo "API health endpoint looks healthy for $HOST"