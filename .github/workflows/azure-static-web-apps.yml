name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: swa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.1

      - name: Install pdftotext (poppler-utils)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Install dependencies
        run: make install

      - name: Run npm audit (save report)
        run: npm audit --json > audit.json || true

      - name: Fail on critical vulnerabilities
        run: |
          node -e "
          const fs = require('fs');
          const p = './audit.json';
          if (!fs.existsSync(p)) { console.log('No audit report'); process.exit(0); }
          const data = JSON.parse(fs.readFileSync(p,'utf8'));
          const vulns = data && data.vulnerabilities ? Object.values(data.vulnerabilities) : [];
          const critical = vulns.filter(v => v.severity === 'critical').length;
          if (critical > 0) { console.error('Critical vulnerabilities found:', critical); process.exit(1); }
          console.log('No critical vulnerabilities');
          "

      - name: Run quality checks
        run: make check

  build_and_deploy_job:
    needs: [quality-checks]
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_BAY_0D4AD7C0F }}
          action: upload
          app_location: "/"
          skip_app_build: true