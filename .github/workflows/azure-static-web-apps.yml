name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: swa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Print npm config
        run: npm config list
      - name: Show npmrc file
        run: cat ~/.npmrc || echo "No .npmrc found"
      - name: Print environment variables
        run: env
      - name: Show Node.js and npm versions
        run: node -v && npm -v
      - name: Remove npm credentials
        run: rm -f ~/.npmrc
      - name: Install dependencies
        run: npm install
      - name: Run cspell
        run: npx cspell "**/*.{html,css,js}" --exclude "assets/**" --exclude ".github/**" --exclude ".git/**"
      - name: Run linkinator
        run: npx linkinator ./index.html
      - name: Run pa11y
        run: npx pa11y ./index.html

  build_and_deploy_job:
    needs: [quality-checks]
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_BAY_0D4AD7C0F }}
          action: upload
          app_location: "/"          # serve static content from repo root
          skip_app_build: true       # no build, just upload files

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR Environment
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_BAY_0D4AD7C0F }}
          action: close