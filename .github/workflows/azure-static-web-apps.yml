name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    types: [ opened, synchronize, reopened, closed ]
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: swa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Configure Node and force npmjs public registry
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # Ensure no auth is used for public installs
      - name: Clear npm auth
        run: |
          unset NODE_AUTH_TOKEN || true
          # Also ensure npm won’t try to auth implicitly
          echo "always-auth=false" >> "$NPM_CONFIG_USERCONFIG"
          echo "Using npmrc at: $NPM_CONFIG_USERCONFIG"
          cat "$NPM_CONFIG_USERCONFIG"

      - name: Install dependencies
        run: npm ci

      - name: Run cspell
        run: npx cspell "**/*.{html,css,js}" --exclude "assets/**" --exclude ".github/**" --exclude ".git/**"

      - name: Run linkinator
        run: npx linkinator ./index.html

      - name: Run pa11y
        run: npx pa11y ./index.html

  build_and_deploy_job:
    needs: [ quality-checks ]
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_BAY_0D4AD7C0F }}
          action: upload
          app_location: "/"
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR Environment
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_BAY_0D4AD7C0F }}
          action: close