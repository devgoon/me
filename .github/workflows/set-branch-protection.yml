name: Set Branch Protection (Require E2E)

on:
  workflow_dispatch:

jobs:
  require-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Require Playwright E2E status check on `main`
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.ADMIN_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'main';
            // Adjust contexts if your workflow shows a different check name
            // Require both Playwright E2E and Make Check workflows
            const contexts = ['Playwright E2E', 'Make Check'];

            await github.rest.repos.updateBranchProtection({
              owner,
              repo,
              branch,
              required_status_checks: {
                strict: true,
                contexts,
              },
              enforce_admins: true,
              required_pull_request_reviews: null,
              restrictions: null,
            });
