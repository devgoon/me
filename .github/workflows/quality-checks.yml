name: Quality Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Print npm config
        run: npm config list
      - name: Show npmrc file
        run: cat ~/.npmrc || echo "No .npmrc found"
      - name: Print environment variables
        run: env
      - name: Show Node.js and npm versions
        run: node -v && npm -v
      - name: Remove npm credentials
        run: rm -f ~/.npmrc
      - name: Install dependencies
        run: npm install
      - name: Run cspell
        run: npx cspell "**/*.{html,css,js}" --exclude "assets/**" --exclude ".github/**" --exclude ".git/**"
      - name: Run linkinator
        run: npx linkinator ./index.html
      - name: Run pa11y
        run: npx pa11y ./index.html
