name: Quality Checks

on:
	push:
		branches:
			- main
	pull_request:
		branches:
			- main

jobs:
	quality-checks:
        name: Quality Checks
		runs-on: ubuntu-latest
		steps:
			- uses: actions/checkout@v4
			- name: Install dependencies
				run: make install
			- name: Run quality checks
				run: make all
