name: Quality Checks

on:
	push:
		branches:
			- main
	pull_request:
		branches:
			- main

jobs:
	quality-checks:
        name: Quality Checks
		runs-on: ubuntu-latest
		steps:
			- uses: actions/checkout@v4
			- name: Show npmrc
			  run: cat ~/.npmrc || echo "No .npmrc found"
			- name: Remove npm credentials
			  run: rm -f ~/.npmrc
			- name: Install dependencies
			  run: make install
			- name: Run quality checks
				run: make all
