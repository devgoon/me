Hi<!DOCTYPE html>
<html>
<head>
    <title>Random Redirect</title>
    <script>
        // Set the total number of pages you have
        const totalPages = 5; // Change this to match your actual number of pages
        
        // Generate random number between 1 and totalPages
        const randomPage = '/code/' + Math.floor(Math.random() * totalPages) + 1;
        
        // Perform the redirect
        window.location.href = randomPage + '.html';
    </script>
</head>
<body>
    <!-- Optional: Add a loading message in case there's any delay -->
    <p>Redirecting to a random page...</p>
</body>
</html>
